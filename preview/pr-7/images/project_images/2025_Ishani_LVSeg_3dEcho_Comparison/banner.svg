<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">A Comparison of Deep Learning Models for Automatic Left-Ventricular Segmentation in 3D Echocardiography</title>
  <desc id="desc">Project banner for a 2025 VISUAL Lab project on comparing deep learning models for left-ventricular segmentation in 3D echocardiography.</desc>
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#081f3f"/>
      <stop offset="55%" stop-color="#0f4c81"/>
      <stop offset="100%" stop-color="#78d6ff"/>
    </linearGradient>
    <linearGradient id="panel" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0.06"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="16" stdDeviation="24" flood-color="#03101f" flood-opacity="0.35"/>
    </filter>
  </defs>

  <rect width="1600" height="900" fill="url(#bg)"/>
  <circle cx="1320" cy="170" r="210" fill="#ffffff" fill-opacity="0.07"/>
  <circle cx="1450" cy="710" r="280" fill="#ffffff" fill-opacity="0.05"/>
  <circle cx="190" cy="760" r="240" fill="#6fe3ff" fill-opacity="0.08"/>

  <g fill="none" stroke="#d8f7ff" stroke-opacity="0.28">
    <path d="M1080 165c56-37 132-32 183 11 51 43 70 117 44 180-26 63-90 105-158 103-68-2-130-48-151-114-21-66 3-139 60-180 7 73 29 115 67 127 42 14 87-19 126-94 18-34 27-66 29-95z" stroke-width="10"/>
    <path d="M1118 196c39-25 88-21 123 10 35 31 48 82 30 126-18 44-63 73-110 72-48-1-91-33-106-79-15-46 2-98 43-127 8 48 23 77 46 87 31 14 67-7 96-55 18-30 28-56 31-79z" stroke-width="6"/>
  </g>

  <g filter="url(#shadow)">
    <rect x="84" y="88" width="940" height="724" rx="36" fill="url(#panel)" stroke="#ffffff" stroke-opacity="0.14"/>
  </g>

  <text x="140" y="170" fill="#dffbff" font-family="Arial, Helvetica, sans-serif" font-size="28" font-weight="700" letter-spacing="4">VISUAL LAB · FEATURED PROJECT · 2025</text>
  <text x="140" y="270" fill="#ffffff" font-family="Arial, Helvetica, sans-serif" font-size="62" font-weight="700">
    <tspan x="140" dy="0">A Comparison of Deep Learning Models</tspan>
    <tspan x="140" dy="82">for Automatic Left-Ventricular Segmentation</tspan>
    <tspan x="140" dy="82">in 3D Echocardiography</tspan>
  </text>
  <text x="140" y="575" fill="#d6f7ff" font-family="Arial, Helvetica, sans-serif" font-size="30">
    <tspan x="140" dy="0">Five deep-learning models compared using Dice, Jaccard,</tspan>
    <tspan x="140" dy="44">Hausdorff distance, and volumetric analysis for LV segmentation.</tspan>
  </text>

  <g transform="translate(1080 470)">
    <rect x="0" y="0" width="370" height="230" rx="28" fill="#ffffff" fill-opacity="0.12" stroke="#ffffff" stroke-opacity="0.18"/>
    <path d="M68 156c31-54 93-95 158-97 56-2 107 23 130 65 15 27 14 63-2 89-20 33-59 52-103 50-21-1-42-7-59-18-19 14-43 21-66 20-40-1-75-24-86-58-8-23-2-47 14-64 5 7 10 12 14 13z" fill="#9ce7ff" fill-opacity="0.76"/>
    <path d="M70 156c31-54 93-95 158-97 56-2 107 23 130 65" stroke="#ffffff" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M74 157c8 11 20 16 36 15 32-1 61-25 85-70 18-34 30-52 56-54 26-2 52 9 76 33" stroke="#082341" stroke-opacity="0.85" stroke-width="5" stroke-linecap="round" fill="none"/>
    <path d="M74 157c-13 18-18 40-10 61 11 34 46 57 86 58 23 1 47-6 66-20 17 11 38 17 59 18 44 2 83-17 103-50 16-26 17-62 2-89" stroke="#ffffff" stroke-width="6" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
    <path d="M201 55v210" stroke="#ffffff" stroke-opacity="0.18" stroke-width="2"/>
  </g>

  <text x="1080" y="752" fill="#effcff" font-family="Arial, Helvetica, sans-serif" font-size="24" font-weight="700" letter-spacing="2">TOPICS</text>
  <text x="1080" y="792" fill="#d6f7ff" font-family="Arial, Helvetica, sans-serif" font-size="28">echocardiography · neural networks · transformers</text>
  <text x="1080" y="832" fill="#d6f7ff" font-family="Arial, Helvetica, sans-serif" font-size="28">left ventricle · image segmentation</text>
</svg>
